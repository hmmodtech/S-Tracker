<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WatchMe — Access</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0a0f1e;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#0f172a;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:40px;width:100%;max-width:440px;box-shadow:0 25px 50px rgba(0,0,0,0.5)}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#ef4444,#b91c1c);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.logo-icon svg{width:28px;height:28px;fill:white}
h1{font-size:22px;font-weight:700;color:#f1f5f9;text-align:center}
.subtitle{font-size:13px;color:#64748b;text-align:center;margin-top:4px}
.tabs{display:flex;gap:4px;background:#1e293b;padding:4px;border-radius:10px;margin:24px 0}
.tab{flex:1;padding:8px;border:none;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;background:transparent;color:#64748b}
.tab.active{background:#0f172a;color:#e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,0.3)}
.pane{display:none}.pane.active{display:block}
.field{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:500;color:#94a3b8;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
input{width:100%;padding:10px 14px;background:#1e293b;border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#e2e8f0;font-size:14px;outline:none;transition:border-color .2s}
input:focus{border-color:#3b82f6}
input::placeholder{color:#475569}
.btn{width:100%;padding:12px;background:#3b82f6;border:none;border-radius:9px;color:white;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s;margin-top:4px}
.btn:hover{background:#2563eb}
.btn:disabled{background:#1e3a5f;color:#475569;cursor:not-allowed}
.btn.danger{background:#ef4444}.btn.danger:hover{background:#dc2626}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:14px;display:none}
.msg.success{background:#14532d33;border:1px solid #22c55e55;color:#86efac}
.msg.error{background:#450a0a33;border:1px solid #ef444455;color:#fca5a5}
.msg.info{background:#1e3a5f33;border:1px solid #3b82f655;color:#93c5fd}
.divider{text-align:center;color:#334155;font-size:12px;margin:16px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:#1e293b}
.divider::before{left:0}.divider::after{right:0}
.footer{text-align:center;font-size:11px;color:#334155;margin-top:24px}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <h1>WatchMe</h1>
    <p class="subtitle">Humanitarian Security Dashboard</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Sign In</button>
    <button class="tab" onclick="switchTab('register')">Request Access</button>
  </div>

  <!-- LOGIN TAB -->
  <div class="pane active" id="pane-login">
    <p style="font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.6">
      Enter your email to receive a one-time login link.
    </p>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="login-email" placeholder="you@organization.org" autocomplete="email"/>
    </div>
    <button class="btn" id="login-btn" onclick="sendLoginRequest()">Send Login Link</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- REGISTER TAB -->
  <div class="pane" id="pane-register">
    <p style="font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.6">
      Request access. The admin will review and approve your request.
    </p>
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="reg-name" placeholder="Jane Smith" autocomplete="name"/>
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="reg-email" placeholder="you@organization.org" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Organization <span style="color:#475569;font-weight:400;text-transform:none">(optional)</span></label>
      <input type="text" id="reg-org" placeholder="UNRWA, MSF, IRC…"/>
    </div>
    <button class="btn" id="reg-btn" onclick="submitRegistration()">Submit Request</button>
    <div class="msg" id="reg-msg"></div>
  </div>

  <div class="footer">WatchMe v2.0 — Gaza Strip Operations</div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
  document.getElementById('pane-login').classList.toggle('active', tab==='login');
  document.getElementById('pane-register').classList.toggle('active', tab==='register');
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text; el.className = `msg ${type}`; el.style.display = 'block';
}

async function sendLoginRequest() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) { showMsg('login-msg','Please enter your email.','error'); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Sending…';
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, name: email.split('@')[0], organization: ''})
    });
    const data = await res.json();
    if (res.status === 400 && data.detail?.includes('approved')) {
      showMsg('login-msg', '✓ Your account is approved. Check your email for a login link, or contact the admin to resend it.', 'info');
    } else if (!res.ok) {
      showMsg('login-msg', data.detail || 'Something went wrong.', 'error');
    } else {
      showMsg('login-msg', '✓ Request submitted! You will receive an email once the admin approves your access.', 'success');
    }
  } catch {
    showMsg('login-msg', 'Network error. Please try again.', 'error');
  }
  btn.disabled = false; btn.textContent = 'Send Login Link';
}

async function submitRegistration() {
  const name  = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const org   = document.getElementById('reg-org').value.trim();
  if (!name)  { showMsg('reg-msg','Please enter your name.','error'); return; }
  if (!email) { showMsg('reg-msg','Please enter your email.','error'); return; }
  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Submitting…';
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, name, organization: org})
    });
    const data = await res.json();
    if (!res.ok) { showMsg('reg-msg', data.detail || 'Error submitting request.', 'error'); }
    else { showMsg('reg-msg', '✓ Request submitted! You will receive an email once the admin reviews your request.', 'success'); }
  } catch {
    showMsg('reg-msg', 'Network error. Please try again.', 'error');
  }
  btn.disabled = false; btn.textContent = 'Submit Request';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('pane-login').classList.contains('active')) sendLoginRequest();
    else submitRegistration();
  }
});
</script>
</body>
</html>
