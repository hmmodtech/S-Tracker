<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-Tracker — Smart Security & Tracking Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet.js -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet Draw -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    
    <!-- Leaflet Context Menu -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-contextmenu@1.4.0/dist/leaflet.contextmenu.css" />
    <script src="https://unpkg.com/leaflet-contextmenu@1.4.0/dist/leaflet.contextmenu.js"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=Manrope:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    
    <!-- Utility Libraries -->
    <script src="https://unpkg.com/@mapbox/togeojson@0.16.2/togeojson.js"></script>
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <!-- Main Container -->
    <div class="flex h-screen bg-gray-900 text-gray-100">
        
        <!-- LEFT SIDEBAR: Layers & Controls -->
        <aside id="sidebar" class="sidebar-glass w-80 flex flex-col border-r border-gray-700 overflow-hidden">
            <!-- Header -->
            <div class="p-4 border-b border-gray-700">
                <h1 class="text-xl font-bold text-blue-400">S-Tracker</h1>
                <p class="text-xs text-gray-400">Smart Security Dashboard</p>
            </div>
            
            <!-- Tabs -->
            <div class="flex border-b border-gray-700">
                <button id="tab-layers" class="flex-1 px-4 py-3 text-sm font-medium border-b-2 border-blue-500 text-blue-400 cursor-pointer">
                    Layers
                </button>
                <button id="tab-incident" class="flex-1 px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-200 cursor-pointer">
                    Incident
                </button>
                <button id="tab-history" class="flex-1 px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-200 cursor-pointer">
                    History
                </button>
            </div>
            
            <!-- Content Area -->
            <div class="flex-1 overflow-y-auto p-4">
                
                <!-- LAYERS TAB -->
                <div id="content-layers" class="space-y-4">
                    <!-- Search Bar -->
                    <input 
                        id="search-bar" 
                        type="text" 
                        placeholder="Search places or coordinates..." 
                        class="w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded text-sm focus:outline-none focus:border-blue-500"
                    >
                    
                    <!-- File Upload -->
                    <div id="upload-area" class="p-4 border-2 border-dashed border-gray-600 rounded cursor-pointer hover:border-blue-500 transition text-center">
                        <p class="text-sm text-gray-400">Drop KML/KMZ/CSV files here</p>
                    </div>
                    
                    <!-- Layers List -->
                    <div id="layers-list" class="space-y-2">
                        <!-- Dynamically populated -->
                    </div>
                </div>
                
                <!-- INCIDENT TAB -->
                <div id="content-incident" class="hidden space-y-4">
                    <div class="text-sm">
                        <label class="block text-gray-300 font-medium mb-2">Incident Type</label>
                        <select id="incident-type" class="w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded text-sm">
                            <option>Airstrike</option>
                            <option>Explosion</option>
                            <option>Fire</option>
                            <option>Medical Emergency</option>
                        </select>
                    </div>
                    
                    <div class="text-sm">
                        <label class="block text-gray-300 font-medium mb-2">Incident Name</label>
                        <input id="incident-name" type="text" placeholder="e.g., Gaza City Airstrike" class="w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded text-sm">
                    </div>
                    
                    <div class="text-sm">
                        <label class="block text-gray-300 font-medium mb-2">Description</label>
                        <textarea id="incident-description" placeholder="Additional details..." class="w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded text-sm h-20"></textarea>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div class="text-sm">
                            <label class="block text-gray-300 font-medium mb-2">Latitude</label>
                            <input id="incident-lat" type="number" placeholder="31.5" class="w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded text-sm" step="0.0001">
                        </div>
                        <div class="text-sm">
                            <label class="block text-gray-300 font-medium mb-2">Longitude</label>
                            <input id="incident-lng" type="number" placeholder="34.47" class="w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded text-sm" step="0.0001">
                        </div>
                    </div>
                </div>
                
                <!-- HISTORY TAB -->
                <div id="content-history" class="hidden space-y-2">
                    <div id="history-list" class="text-xs text-gray-400">
                        <!-- Populated dynamically -->
                    </div>
                </div>
            </div>
            
            <!-- Footer Controls -->
            <div class="p-4 border-t border-gray-700 space-y-2">
                <button id="btn-theme" class="w-full px-3 py-2 bg-gray-800 hover:bg-gray-700 rounded text-sm">
                    🌙 Dark Mode
                </button>
                <button id="btn-export" class="w-full px-3 py-2 bg-blue-600 hover:bg-blue-700 rounded text-sm font-medium">
                    ⬇️ Export KML
